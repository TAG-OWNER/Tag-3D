<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tikkertje 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let player = { x: 50, y: 50, size: 20, color: 'blue' };
        let opponents = [];
        let score = 0;

        function init() {
            for (let i = 0; i < 10; i++) {
                opponents.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: 20, color: 'red' });
            }
            requestAnimationFrame(loop);
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPlayer();
            drawOpponents();
            requestAnimationFrame(loop);
        }

        function drawPlayer() {
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);
        }

        function drawOpponents() {
            opponents.forEach(opponent => {
                ctx.fillStyle = opponent.color;
                ctx.fillRect(opponent.x, opponent.y, opponent.size, opponent.size);
            });
        }

        window.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':
                    player.y -= 5;
                    break;
                case 'ArrowDown':
                    player.y += 5;
                    break;
                case 'ArrowLeft':
                    player.x -= 5;
                    break;
                case 'ArrowRight':
                    player.x += 5;
                    break;
            }
        });

        init();
    </script>
</body>
</html>
